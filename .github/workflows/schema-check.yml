name: Schema Drift Gate
on: [push, pull_request]
jobs:
  schema-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install schema-guard
        run: pip install -e .
      - name: Debug – check secret length
        run: |
          if [ -z "$DB_CONNECTION_STRING" ]; then
            echo "ERROR: DB_CONNECTION_STRING is empty"
            exit 1
          else
            echo "DB_CONNECTION_STRING length: ${#DB_CONNECTION_STRING}"
          fi
    env:
      DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
      # Provide secret at the job level so the GitHub context is valid for all steps
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}