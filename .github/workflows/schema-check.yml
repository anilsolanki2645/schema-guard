name: Schema Drift Gate
on: [push, pull_request]
jobs:
  schema-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install schema-guard
        run: pip install -e .

      # Debug step – checks if secret is available
      - name: Debug – check secret length
        run: |
          if [ -z "$DB_CONNECTION_STRING" ]; then
            echo "ERROR: DB_CONNECTION_STRING is empty"
            exit 1
          else
            echo "DB_CONNECTION_STRING length: ${#DB_CONNECTION_STRING}"
          fi
        env:
          DB_CONNECTION_STRING: "postgresql://neondb_owner:npg_YwQcVqyP81uo@ep-ancient-boat-apzhsnel-pooler.c-7.us-east-1.aws.neon.tech/neondb?sslmode=require"

      # The actual gate – runs only if debug passed
      - name: Run schema gate
        run: schema-guard gate --contract contracts/orders.yaml --snapshot-file snapshots/orders.json
        env:
          DB_CONNECTION_STRING: "postgresql://neondb_owner:npg_YwQcVqyP81uo@ep-ancient-boat-apzhsnel-pooler.c-7.us-east-1.aws.neon.tech/neondb?sslmode=require"
          EMAIL_ENABLED: "true"
          EMAIL_HOST: "smtp.gmail.com"
          EMAIL_PORT: "587"
          EMAIL_USER: "anusolanki2645@gmail.com"
          EMAIL_PASSWORD: "odkk gtjq yvdd mxwr"    # Use an App Password, not your real password
          EMAIL_FROM: "anusolanki2645@gmail.com"
          EMAIL_TO: "anil94382@gmail.com"        # Can be a list separated by commas
          EMAIL_SUBJECT: "Schema Drift Detected"