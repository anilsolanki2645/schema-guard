name: Schema Drift Gate
on: [push, pull_request]
jobs:
  schema-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install schema-guard
        run: pip install -e .

      # Debug step – checks if secret is available
      - name: Debug – check secret length
        run: |
          if [ -z "$DB_CONNECTION_STRING" ]; then
            echo "ERROR: DB_CONNECTION_STRING is empty"
            exit 1
          else
            echo "DB_CONNECTION_STRING length: ${#DB_CONNECTION_STRING}"
          fi
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}

      # The actual gate – runs only if debug passed
      - name: Run schema gate
        run: schema-guard gate --contract contracts/orders.yaml --snapshot-file snapshots/orders.json
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          EMAIL_ENABLED: true
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_SUBJECT: "Schema Drift Detected in CI"